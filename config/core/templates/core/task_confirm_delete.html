{% extends 'core/base.html' %}
{% block title %}Delete Task - Taskify{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4 text-center">
                <h3 class="fw-bold text-danger mb-3">Delete Task</h3>
                <p class="mb-4">Are you sure you want to delete <strong>"{{ task.title }}"</strong>? This cannot be undone.</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                    <a href="/tasks/" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
