<h1>Edit Task</h1>

<form method="POST">
    {% csrf_token %}

    <label>Title</label>
    <input type="text" name="title" value="{{ task.title }}">

    <br><br>

    <label>Description</label>
    <textarea name="description">{{ task.description }}</textarea>

    <br><br>

    <button type="submit">Update Task</button>
</form>

<br>

<a href="/tasks/">Back</a>
