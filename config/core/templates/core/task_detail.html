{% extends 'core/base.html' %}
{% block title %}{{ task.title }} - Taskify{% endblock %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="fw-bold">{{ task.title }}</h2>
            {% if task.completed %}
                <span class="badge bg-success fs-6">Completed</span>
            {% else %}
                <span class="badge bg-warning text-dark fs-6">Pending</span>
            {% endif %}
        </div>
        <p class="text-muted">{{ task.description }}</p>
        <hr>
        <a href="/tasks/{{ task.id }}/edit/" class="btn btn-outline-secondary">Edit</a>
        <a href="/tasks/{{ task.id }}/delete/" class="btn btn-outline-danger">Delete</a>
        <a href="/tasks/" class="btn btn-outline-primary">Back to Tasks</a>
    </div>
</div>
{% endblock %}
